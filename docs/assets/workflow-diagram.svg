    <path d="M690 250l-12-8v16z"/>
    <path d="M1010 250l-12-8v16z"/>
    <path d="M377 411l-14-3 8 12z"/>
    <path d="M530 496l-12-8v16z"/>
    <path d="M850 496l-12-8v16z"/>
