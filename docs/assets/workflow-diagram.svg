<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Image2Slides v1 workflow</title>
  <desc id="desc">A clean workflow diagram showing required inputs, wiki boundaries, GPT-image-2 completed references, text-free background edits, source locking, editable PowerPoint build, and QA plus PDF review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="1" stop-color="#0066cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; fill: #667085; }
      .card-title { font: 700 18px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .card-copy { font: 400 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; fill: #667085; }
      .num { font: 700 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1440" height="820" rx="42" fill="url(#bg)"/>
  <path d="M70 138 C254 58 379 84 530 137 C696 196 833 175 997 102 C1156 30 1278 48 1370 104" fill="none" stroke="#d1e5ff" stroke-width="3"/>
  <path d="M92 665 C252 584 414 602 570 666 C729 731 852 735 1008 675 C1187 606 1292 616 1364 680" fill="none" stroke="#d8e8fb" stroke-width="3"/>

  <text x="82" y="82" class="title">Image2Slides v1 workflow</text>
  <text x="82" y="120" class="subtitle">two GPT-image-2 batches, source-locked figures, editable PowerPoint, pixel/patch QA, and review</text>

  <g filter="url(#shadow)">
    <g transform="translate(70 190)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">1</text>
      <text x="68" y="42" class="card-title">Required input</text>
      <text x="28" y="78" class="card-copy">tone, ratio, count</text>
      <text x="28" y="101" class="card-copy">purpose, scene, knowledge</text>
    </g>

    <g transform="translate(390 190)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">2</text>
      <text x="68" y="42" class="card-title">Wiki boundary</text>
      <text x="28" y="78" class="card-copy">source registry</text>
      <text x="28" y="101" class="card-copy">grep vs generate split</text>
    </g>

    <g transform="translate(710 190)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">3</text>
      <text x="68" y="42" class="card-title">Completed refs</text>
      <text x="28" y="78" class="card-copy">GPT-image-2 full slides</text>
      <text x="28" y="101" class="card-copy">visible text target</text>
    </g>

    <g transform="translate(1030 190)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">4</text>
      <text x="68" y="42" class="card-title">Background edits</text>
      <text x="28" y="78" class="card-copy">remove only text</text>
      <text x="28" y="101" class="card-copy">preserve geometry</text>
    </g>

    <g transform="translate(230 475)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">5</text>
      <text x="68" y="42" class="card-title">Source-lock</text>
      <text x="28" y="78" class="card-copy">exact figures in panels</text>
      <text x="28" y="101" class="card-copy">no editable text inside</text>
    </g>

    <g transform="translate(550 475)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">6</text>
      <text x="68" y="42" class="card-title">Editable PPTX</text>
      <text x="28" y="78" class="card-copy">background as base</text>
      <text x="28" y="101" class="card-copy">PowerPoint text overlay</text>
    </g>

    <g transform="translate(870 475)">
      <rect width="250" height="136" rx="18" fill="#fff" stroke="#e6ebf2"/>
      <circle cx="38" cy="42" r="17" fill="url(#blue)"/>
      <text x="34" y="47" class="num">7</text>
      <text x="68" y="42" class="card-title">QA + PDF</text>
      <text x="28" y="78" class="card-copy">pixel/patch score</text>
      <text x="28" y="101" class="card-copy">blank-zone overlays</text>
    </g>
  </g>

  <g fill="none" stroke="url(#blue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M320 258h48"/>
    <path d="M640 258h48"/>
    <path d="M960 258h48"/>
    <path d="M1155 328c0 88-610 36-795 126"/>
    <path d="M480 543h48"/>
    <path d="M800 543h48"/>
  </g>
  <g fill="#0a84ff">
    <path d="M368 258l-12-8v16z"/>
    <path d="M688 258l-12-8v16z"/>
    <path d="M1008 258l-12-8v16z"/>
    <path d="M360 454l-14-3 8 12z"/>
    <path d="M528 543l-12-8v16z"/>
    <path d="M848 543l-12-8v16z"/>
  </g>
</svg>
